# ------------------------------------------------------------------
# Linux Kernel Network Tuning Baseline
# Purpose: Optimize routing performance and enable TCP BBR
# ------------------------------------------------------------------

# IP Forwarding for Routing
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Congestion Control (BBR)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# TCP Performance Tuning
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_keepalive_time = 1200
net.ipv4.tcp_rmem = 4096 87380 25000000
net.ipv4.tcp_wmem = 4096 16384 25000000
net.core.rmem_max = 25000000
net.core.wmem_max = 25000000

# Security (Protect against SYN flood)
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
